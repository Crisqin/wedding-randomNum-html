<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚礼抽奖系统 - 第二版</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "SimHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffeeee, #ffe6e6);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* 标题样式 */
        .title {
            text-align: center;
            color: #d43f3a;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            z-index: 1;
        }

        .title h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: 8px;
        }

        /* 页面容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: stretch;
            gap: 40px;
            padding-top: 120px;
            min-height: calc(100vh - 120px);
        }

        /* 参数设置区域（小面积） */
        .settings {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(212, 63, 58, 0.15);
            width: 300px;
            flex-shrink: 0;
            border: 2px solid #f8d0d0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 装饰性背景图案 */
        .settings::before {
            content: "❤️";
            color: rgba(212, 63, 58, 0.05);
            font-size: 120px;
            position: absolute;
            top: -20px;
            right: -20px;
            z-index: 0;
        }

        .settings::after {
            content: "💍";
            color: rgba(230, 126, 34, 0.05);
            font-size: 100px;
            position: absolute;
            bottom: -20px;
            left: -20px;
            z-index: 0;
        }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .settings h3 {
            color: #d43f3a;
            text-align: center;
            font-size: 1.3rem;
            margin: 0;
        }

        /* 图标样式 */
        .icon {
            color: #d43f3a;
            font-size: 1.2rem;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 10px 10px 10px 12px;
            border: 2px solid #f0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            position: relative;
            z-index: 1;
        }

        .form-group input:focus {
            border-color: #d43f3a;
        }

        .btn-group {
            margin-top: auto;
            position: relative;
            z-index: 1;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #d43f3a, #e67e22);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 63, 58, 0.3);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn#resetBtn {
            background: #999;
        }

        /* 结果展示区域（重点） */
        .result-container {
            flex: 1;
            background: #fff;
            border-radius: 15px;
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(212, 63, 58, 0.15);
            border: 2px solid #f8d0d0;
            position: relative;
            overflow: hidden;
        }

        /* 摇号动画容器 */
        .lottery-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .lottery-animation.active {
            opacity: 1;
            pointer-events: all;
        }

        .animation-title {
            color: #d43f3a;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 4px;
        }

        .animation-numbers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            width: 100%;
            align-items: center;
        }

        /* 摇号数字样式 */
        .animation-number-item {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #d43f3a, #ff6b6b);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(212, 63, 58, 0.3);
            border: 4px solid #fff;
            position: relative;
            overflow: hidden;
        }

        /* 超大号摇号数字 */
        .animation-number-item.large {
            width: 280px;
            height: 280px;
            font-size: 7rem;
            box-shadow: 0 15px 30px rgba(212, 63, 58, 0.4);
        }

        .animation-numbers.two-items {
            gap: 80px;
        }

        /* 结果展示数字样式 */
        .result-numbers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            width: 100%;
            align-items: center;
        }

        .number-item {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #d43f3a, #ff6b6b);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(212, 63, 58, 0.3);
            transition: all 0.5s ease;
            border: 4px solid #fff;
            opacity: 0;
            transform: scale(0);
        }

        .number-item.large {
            width: 280px;
            height: 280px;
            font-size: 7rem;
            box-shadow: 0 15px 30px rgba(212, 63, 58, 0.4);
        }

        .result-numbers.two-items {
            gap: 80px;
        }

        .number-item.show {
            opacity: 1;
            transform: scale(1);
        }

        .number-item:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 12px 25px rgba(212, 63, 58, 0.4);
        }

        .empty-state {
            color: #999;
            font-size: 1.8rem;
            text-align: center;
            padding: 50px;
        }

        /* 响应式适配 */
        @media (max-width: 992px) {
            .container {
                flex-direction: column;
                gap: 20px;
                padding-top: 100px;
            }
            
            .settings {
                width: 100%;
                min-height: auto;
            }

            .result-container {
                min-height: 400px;
            }

            .title h1 {
                font-size: 2.5rem;
            }

            /* 移动端适配 */
            .animation-number-item, .number-item {
                width: 100px;
                height: 100px;
                font-size: 2.2rem;
            }

            .animation-number-item.large, .number-item.large {
                width: 200px;
                height: 200px;
                font-size: 5rem;
            }

            .animation-numbers.two-items, .result-numbers.two-items {
                gap: 40px;
            }

            .animation-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="title">
        <h1>新婚快乐 · 幸运抽奖</h1>
    </div>
    <div class="container">
        <!-- 参数设置区域 -->
        <div class="settings">
            <div class="settings-header">
                <span class="icon">💍</span>
                <h3>抽奖设置</h3>
                <span class="icon">❤️</span>
            </div>
            <div class="form-group">
                <label for="minNum">
                    <span class="icon">⭐</span>
                    起始数字
                </label>
                <input type="number" id="minNum" value="1" min="1" placeholder="请输入起始数字">
            </div>
            <div class="form-group">
                <label for="maxNum">
                    <span class="icon">🔥</span>
                    结束数字
                </label>
                <input type="number" id="maxNum" value="100" min="1" placeholder="请输入结束数字">
            </div>
            <div class="form-group">
                <label for="count">
                    <span class="icon">🎁</span>
                    抽取数量
                </label>
                <input type="number" id="count" value="6" min="1" max="50" placeholder="请输入抽取数量">
            </div>
            <div class="btn-group">
                <button class="btn" id="drawBtn">
                    <span class="icon">🎉</span>
                    开始抽奖
                </button>
                <button class="btn" id="resetBtn">
                    <span class="icon">🔄</span>
                    重置结果
                </button>
            </div>
        </div>

        <!-- 结果展示区域 -->
        <div class="result-container">
            <!-- 摇号动画层 -->
            <div class="lottery-animation" id="lotteryAnimation">
                <h2 class="animation-title">正在抽取幸运号码...</h2>
                <div class="animation-numbers" id="animationNumbers"></div>
            </div>

            <!-- 结果展示层 -->
            <div class="result-numbers" id="resultNumbers">
                <div class="empty-state">
                    点击左侧按钮开始抽奖<br>
                    开启幸运时刻 🎉
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const minNumInput = document.getElementById('minNum');
        const maxNumInput = document.getElementById('maxNum');
        const countInput = document.getElementById('count');
        const drawBtn = document.getElementById('drawBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultNumbers = document.getElementById('resultNumbers');
        const lotteryAnimation = document.getElementById('lotteryAnimation');
        const animationNumbers = document.getElementById('animationNumbers');

        // 全局变量
        let animationInterval = null; // 摇号动画定时器
        let animationSpeed = 50; // 初始摇号速度（毫秒）
        const slowDownStep = 20; // 减速步长
        const minSpeed = 300; // 最慢速度
        const animationDuration = 4000; // 总动画时长（毫秒）

        // 抽奖函数
        drawBtn.addEventListener('click', function() {
            // 获取输入值并验证
            const min = parseInt(minNumInput.value);
            const max = parseInt(maxNumInput.value);
            const count = parseInt(countInput.value);

            // 验证输入合法性
            if (isNaN(min) || isNaN(max) || isNaN(count)) {
                alert('请输入有效的数字！');
                return;
            }

            if (min >= max) {
                alert('起始数字必须小于结束数字！');
                return;
            }

            if (count < 1 || count > 50) {
                alert('抽取数量必须在1-50之间！');
                return;
            }

            if ((max - min + 1) < count) {
                alert(`抽取数量不能超过数字范围（可选数量：${max - min + 1}）！`);
                return;
            }

            // 禁用抽奖按钮，防止重复点击
            drawBtn.disabled = true;
            
            // 生成最终中奖号码
            const winningNumbers = generateUniqueNumbers(min, max, count);
            
            // 初始化摇号动画
            initLotteryAnimation(min, max, count);
            
            // 启动摇号动画
            startLotteryAnimation(min, max, count, winningNumbers);
        });

        // 重置按钮
        resetBtn.addEventListener('click', function() {
            // 停止所有动画
            stopLotteryAnimation();
            
            // 重置界面
            resultNumbers.innerHTML = `
                <div class="empty-state">
                    点击左侧按钮开始抽奖<br>
                    开启幸运时刻 🎉
                </div>
            `;
            resultNumbers.className = 'result-numbers';
            lotteryAnimation.classList.remove('active');
            
            // 启用抽奖按钮
            drawBtn.disabled = false;
            
            // 重置动画参数
            animationSpeed = 50;
        });

        // 生成不重复的随机数
        function generateUniqueNumbers(min, max, count) {
            const numbers = [];
            while (numbers.length < count) {
                const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
                if (!numbers.includes(randomNum)) {
                    numbers.push(randomNum);
                }
            }
            // 排序
            numbers.sort((a, b) => a - b);
            return numbers;
        }

        // 初始化摇号动画界面
        function initLotteryAnimation(min, max, count) {
            // 清空动画容器
            animationNumbers.innerHTML = '';
            
            // 设置动画容器样式
            animationNumbers.className = 'animation-numbers';
            if (count === 2) {
                animationNumbers.classList.add('two-items');
            }
            
            // 创建摇号数字容器
            const isLarge = count <= 2;
            for (let i = 0; i < count; i++) {
                const numberItem = document.createElement('div');
                numberItem.className = `animation-number-item ${isLarge ? 'large' : ''}`;
                numberItem.textContent = getRandomNumber(min, max);
                animationNumbers.appendChild(numberItem);
            }
            
            // 显示动画层
            lotteryAnimation.classList.add('active');
        }

        // 启动摇号动画
        function startLotteryAnimation(min, max, count, winningNumbers) {
            const numberItems = animationNumbers.querySelectorAll('.animation-number-item');
            
            // 重置速度
            animationSpeed = 50;
            
            // 启动数字滚动
            animationInterval = setInterval(() => {
                // 更新每个数字
                numberItems.forEach(item => {
                    item.textContent = getRandomNumber(min, max);
                });
                
                // 逐渐减速
                if (animationSpeed < minSpeed) {
                    animationSpeed += slowDownStep;
                    clearInterval(animationInterval);
                    animationInterval = setInterval(() => {
                        numberItems.forEach(item => {
                            item.textContent = getRandomNumber(min, max);
                        });
                    }, animationSpeed);
                }
            }, animationSpeed);
            
            // 动画结束后显示结果
            setTimeout(() => {
                stopLotteryAnimation();
                showWinningNumbers(winningNumbers, count);
            }, animationDuration);
        }

        // 停止摇号动画
        function stopLotteryAnimation() {
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }
        }

        // 显示中奖号码
        function showWinningNumbers(numbers, count) {
            // 隐藏动画层
            lotteryAnimation.classList.remove('active');
            
            // 清空结果容器
            resultNumbers.innerHTML = '';
            
            // 设置结果容器样式
            resultNumbers.className = 'result-numbers';
            if (count === 2) {
                resultNumbers.classList.add('two-items');
            }
            
            // 创建结果数字元素
            const isLarge = count <= 2;
            numbers.forEach((num, index) => {
                const numberItem = document.createElement('div');
                numberItem.className = `number-item ${isLarge ? 'large' : ''}`;
                numberItem.textContent = num;
                resultNumbers.appendChild(numberItem);
                
                // 逐个显示动画
                setTimeout(() => {
                    numberItem.classList.add('show');
                }, 300 * index);
            });
            
            // 启用抽奖按钮
            drawBtn.disabled = false;
            
            // 重置动画速度
            animationSpeed = 50;
        }

        // 获取随机数
        function getRandomNumber(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
    </script>
</body>
</html>
